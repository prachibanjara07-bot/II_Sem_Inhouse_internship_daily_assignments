<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Card Grid</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.user-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.user-card{
    background:#fff;
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.user-card:hover{
    transform:translateY(-8px);
}

.user-card img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}

.user-card h2{
    margin-bottom:8px;
    color:#333;
}

.user-card p{
    color:#666;
    margin-bottom:15px;
}

.user-card button{
    padding:10px 20px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.user-card button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<h1>User Card Grid</h1>

<div class="user-grid">

<div class="user-card">
<img src="https://randomuser.me/api/portraits/women/1.jpg" alt="User">
<h2>jaya Sharma</h2>
<p>Frontend Developer</p>
<button>View Profile</button>
</div>

<div class="user-card">
<img src="https://randomuser.me/api/portraits/men/2.jpg" alt="User">
<h2>Rahul Verma</h2>
<p>UI/UX Designer</p>
<button>View Profile</button>
</div>

<div class="user-card">
<img src="https://randomuser.me/api/portraits/women/3.jpg" alt="User">
<h2>Ananya Singh</h2>
<p>Data Analyst</p>
<button>View Profile</button>
</div>

<div class="user-card">
<img src="https://randomuser.me/api/portraits/men/4.jpg" alt="User">
<h2>Arjun gupta</h2>
<p>Backend Developer</p>
<button>View Profile</button>
</div>

</div>

</body>
</html>
